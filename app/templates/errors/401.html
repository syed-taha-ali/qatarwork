<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Access Denied — QatarWork</title>
  <link rel="stylesheet" href="/static/css/main.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #8B1A1A 0%, #5a0f0f 100%);
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    .error-container {
      text-align: center;
      padding: 3rem;
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      max-width: 500px;
      margin: 2rem;
    }
    .error-icon {
      font-size: 80px;
      margin-bottom: 1rem;
    }
    .error-code {
      font-size: 72px;
      font-weight: 800;
      color: #8B1A1A;
      margin: 0;
      line-height: 1;
    }
    .error-title {
      font-size: 24px;
      font-weight: 600;
      color: #333;
      margin: 1rem 0 0.5rem;
    }
    .error-message {
      color: #666;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    .btn-group {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn {
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.2s;
      display: inline-block;
    }
    .btn-primary {
      background: #8B1A1A;
      color: white;
    }
    .btn-primary:hover {
      background: #6d1414;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(139,26,26,0.3);
    }
    .btn-secondary {
      background: white;
      color: #8B1A1A;
      border: 2px solid #8B1A1A;
    }
    .btn-secondary:hover {
      background: #f9f9f9;
    }
  </style>
</head>
<body>
  <div class="error-container">
    <div class="error-icon">🔒</div>
    <h1 class="error-code">401</h1>
    <h2 class="error-title">Authentication Required</h2>
    <p class="error-message">
      You need to be logged in to access this page.
      <br>Please log in or create an account to continue.
    </p>
    <div class="btn-group">
      <a href="/auth/login" class="btn btn-primary">Log In</a>
      <a href="/auth/register" class="btn btn-secondary">Sign Up</a>
    </div>
  </div>
</body>
</html>
