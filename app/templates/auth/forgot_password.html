{% extends "base.html" %}
{% block title %}Forgot Password — QatarWork{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <h1>🔑 Reset Password</h1>
      <p>Enter your email to receive a password reset code</p>
    </div>

    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    {% if success %}
    <div class="alert alert-success">{{ success }}</div>
    {% endif %}

    <form method="POST" action="/auth/forgot-password" class="auth-form">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="your-email@example.com" required autofocus />
      </div>

      <button type="submit" class="btn btn-primary btn-block">Send Reset Code</button>

      <div style="text-align: center; margin-top: 1.5rem;">
        <a href="/auth/login" class="text-muted" style="font-size: 0.9rem;">← Back to Login</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
