{% extends "base.html" %}
{% block title %}Post a Job — QatarWork{% endblock %}

{% block content %}
<div class="container page-narrow">
  <div class="form-card">
    <h1>Post a Job</h1>
    <p class="text-muted">Describe what you need and workers will be matched to your job.</p>

    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/jobs/create" class="main-form">

      <div class="form-group">
        <label for="title">Job Title</label>
        <input type="text" id="title" name="title"
               placeholder="e.g. Need a maid for deep house cleaning"
               required />
      </div>

      <div class="form-group">
        <label for="description">Job Description</label>
        <textarea id="description" name="description" rows="4" required
                  placeholder="Describe the work in detail — what needs to be done, any special requirements, etc."></textarea>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="skill_required">Skill Required</label>
          <select id="skill_required" name="skill_required" required>
            <optgroup label="Skilled Trades">
              {% for skill in ['general_handyman', 'locksmith', 'electrician', 'plumber', 'carpenter', 'hvac_tech', 'painter', 'gardener', 'chef', 'exterminator'] %}
              <option value="{{ skill }}">{{ skill_labels.get(skill, skill | title) }}</option>
              {% endfor %}
            </optgroup>
            <optgroup label="Care & Personal Support">
              {% for skill in ['maid', 'nanny', 'nurse', 'babysitter', 'pet_sitter'] %}
              <option value="{{ skill }}">{{ skill_labels.get(skill, skill | title) }}</option>
              {% endfor %}
            </optgroup>
            <optgroup label="Other">
              <option value="other">Other</option>
            </optgroup>
          </select>
        </div>
        <div class="form-group">
          <label for="location">Location</label>
          <input type="text" id="location" name="location"
                 placeholder="e.g. Al Rayyan, Qatar" required />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="duration_hours">Duration (hours)</label>
          <input type="number" id="duration_hours" name="duration_hours"
                 min="0.5" step="0.5" placeholder="e.g. 4" required />
        </div>
        <div class="form-group">
          <label for="budget">Your Budget (QAR)</label>
          <input type="number" id="budget" name="budget"
                 min="1" step="1" placeholder="e.g. 200" required />
          <small class="text-muted">A 10% platform fee will be added at booking</small>
        </div>
      </div>

      <div class="form-actions">
        <a href="/dashboard" class="btn btn-outline">Cancel</a>
        <button type="submit" class="btn btn-primary">Post Job</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
