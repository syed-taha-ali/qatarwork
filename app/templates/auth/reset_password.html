{% extends "base.html" %}
{% block title %}Reset Password — QatarWork{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <h1>🔐 Enter Reset Code</h1>
      <p>We've sent a code to <strong>{{ email }}</strong></p>
    </div>

    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/auth/reset-password" class="auth-form">
      <input type="hidden" name="email" value="{{ email }}" />

      <div class="form-group">
        <label for="code">Reset Code</label>
        <input type="text" id="code" name="code" placeholder="000000" 
               maxlength="6" pattern="\d{6}" required autofocus 
               style="text-align: center; font-size: 1.5rem; letter-spacing: 0.5rem;" />
        <small class="text-muted">Enter the 6-digit code from your email</small>
      </div>

      <div class="form-group">
        <label for="new_password">New Password</label>
        <input type="password" id="new_password" name="new_password" 
               placeholder="At least 6 characters" required minlength="6" />
      </div>

      <div class="form-group">
        <label for="confirm_password">Confirm New Password</label>
        <input type="password" id="confirm_password" name="confirm_password" 
               placeholder="Re-enter password" required minlength="6" />
      </div>

      <button type="submit" class="btn btn-primary btn-block">Reset Password</button>

      <div style="text-align: center; margin-top: 1.5rem;">
        <p class="text-muted">Didn't receive the code?</p>
        <a href="/auth/forgot-password?email={{ email }}" class="btn btn-outline btn-sm">Resend Code</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
